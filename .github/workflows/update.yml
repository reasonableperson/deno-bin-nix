name: Update Deno

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Update pinned Deno release and commit changes
        run: |
          set -euo pipefail

          current_version="$(jq -r '.version' metadata.json)"
          ./update.sh
          latest_version="$(jq -r '.version' metadata.json)"

          if git diff --quiet -- metadata.json; then
            echo "no changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metadata.json
          git commit -m "update: Deno ${current_version} -> ${latest_version}"
          git push
